<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Trip - Envelope</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ป้องกันการเลื่อนแบบสะดุด */
        }

        /* Container หลัก */
        .wrapper {
            display: flex;
            width: 200vw; /* กว้าง 2 หน้าจอสำหรับ Image1 -> Image2 */
            height: 100vh;
            transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* หน้าสำหรับเก็บ Image 2, 3 และ GIF เพื่อเลื่อนขึ้น */
        .vertical-stack {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 300vh; /* สูง 3 หน้าจอสำหรับ Image2, Image3, Gif1 */
            transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .slide {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* ตกแต่งเพิ่มเติม */
        .hint {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #555;
            font-family: sans-serif;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="wrapper" id="mainWrapper">
        <div class="slide">
            <img src="Image1.PNG" alt="From Axe">
        </div>

        <div class="vertical-stack" id="vStack">
            <div class="slide">
                <img src="Image2.PNG" alt="Open">
            </div>
            <div class="slide">
                <img src="Image3.PNG" alt="Pull me">
            </div>
            <div class="slide">
                <img src="Gif1.GIF" alt="Safe Trip">
            </div>
        </div>
    </div>

    <div class="hint">เลื่อนหน้าจอเพื่อไปต่อ</div>

    <script>
        let currentStep = 0; // 0: Image1, 1: Image2, 2: Image3, 3: Gif1
        const mainWrapper = document.getElementById('mainWrapper');
        const vStack = document.getElementById('vStack');
        let isMoving = false;

        function navigate(direction) {
            if (isMoving) return;
            
            // เลื่อนไปข้างหน้า
            if (direction > 0 && currentStep < 3) {
                currentStep++;
            } 
            // เลื่อนย้อนกลับ
            else if (direction < 0 && currentStep > 0) {
                currentStep--;
            } else {
                return;
            }

            isMoving = true;
            updatePosition();
            
            setTimeout(() => {
                isMoving = false;
            }, 600); // รอให้ Animation จบ
        }

        function updatePosition() {
            if (currentStep === 0) {
                mainWrapper.style.transform = `translateX(0)`;
                vStack.style.transform = `translateY(0)`;
            } else {
                // เลื่อนไปทางซ้ายเพื่อโชว์ชุดแนวตั้ง
                mainWrapper.style.transform = `translateX(-100vw)`;
                // เลื่อนแนวตั้งตามลำดับ (1=Image2, 2=Image3, 3=Gif1)
                const vOffset = (currentStep - 1) * 100;
                vStack.style.transform = `translateY(-${vOffset}vh)`;
            }
        }

        // รองรับการใช้ Mouse Wheel / Touchpad
        window.addEventListener('wheel', (e) => {
            navigate(e.deltaY || e.deltaX);
        });

        // รองรับการปัดหน้าจอมือถือ
        let touchStartY = 0;
        let touchStartX = 0;

        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            touchStartX = e.touches[0].clientX;
        });

        window.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const touchEndX = e.changedTouches[0].clientX;
            const diffY = touchStartY - touchEndY;
            const diffX = touchStartX - touchEndX;

            // ถ้าปัดแนวนอน (หน้าแรกไปหน้าสอง) หรือปัดแนวตั้ง
            if (Math.abs(diffX) > Math.abs(diffY)) {
                navigate(diffX);
            } else {
                navigate(diffY);
            }
        });
    </script>
</body>
</html>
