<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Pattern Navigation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ซ่อนภาพเริ่มต้น */
            clip-path: inset(0 0 0 0); 
            z-index: 1;
            transition: clip-path 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* จัดลำดับ Layer */
        .slide-1 { z-index: 4; }
        .slide-2 { z-index: 3; }
        .slide-3 { z-index: 2; }
        .slide-4 { z-index: 1; }

        /* สถานะเมื่อถูกซ่อน (เลื่อนออก) */
        /* รูป 1 เลื่อนออกไปทางซ้าย */
        .slide-1.hidden {
            clip-path: inset(0 100% 0 0);
        }
        /* รูป 2 เลื่อนออกขึ้นข้างบน */
        .slide-2.hidden {
            clip-path: inset(0 0 100% 0);
        }
        /* รูป 3 เลื่อนออกขึ้นข้างบน */
        .slide-3.hidden {
            clip-path: inset(0 0 100% 0);
        }

        img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            user-select: none;
        }

        .hint {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #333;
            font-family: sans-serif;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="slide slide-1" id="s1">
            <img src="Image1.PNG">
        </div>

        <div class="slide slide-2" id="s2">
            <img src="Image2.PNG">
        </div>

        <div class="slide slide-3" id="s3">
            <img src="Image3.PNG">
        </div>

        <div class="slide slide-4">
            <img src="Gif1.GIF">
        </div>
    </div>

    <div class="hint" id="hintText">ปัดซ้าย เพื่อเริ่ม</div>

    <script>
        let step = 1;
        const totalSteps = 4;
        let isWaiting = false;

        function handleNavigate(direction) {
            if (isWaiting) return;

            // เลื่อนไปข้างหน้า (Scroll Down / Swipe Up / Swipe Left)
            if (direction > 0 && step < totalSteps) {
                const currentSlide = document.getElementById(`s${step}`);
                if (currentSlide) {
                    currentSlide.classList.add('hidden');
                    step++;
                    updateHint();
                }
            } 
            // เลื่อนย้อนกลับ
            else if (direction < 0 && step > 1) {
                step--;
                const prevSlide = document.getElementById(`s${step}`);
                if (prevSlide) {
                    prevSlide.classList.remove('hidden');
                    updateHint();
                }
            }

            isWaiting = true;
            setTimeout(() => isWaiting = false, 850);
        }

        function updateHint() {
            const hint = document.getElementById('hintText');
            if (step === 1) hint.innerText = "ปัดซ้าย เพื่อเปิด";
            else if (step < totalSteps) hint.innerText = "ปัดขึ้น เพื่อไปต่อ";
            else hint.innerText = "Safe Trip! :)";
        }

        // รองรับเมาส์
        window.addEventListener('wheel', (e) => {
            handleNavigate(e.deltaY);
        });

        // รองรับสัมผัส
        let startX, startY;
        window.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', e => {
            let diffX = startX - e.changedTouches[0].clientX;
            let diffY = startY - e.changedTouches[0].clientY;

            // ถ้าอยู่หน้าแรก ใช้การปัดแนวนอน (ซ้าย)
            if (step === 1) {
                if (Math.abs(diffX) > 50) handleNavigate(diffX);
            } 
            // หน้าอื่นๆ ใช้การปัดแนวตั้ง (ขึ้น)
            else {
                if (Math.abs(diffY) > 50) handleNavigate(diffY);
            }
        });
    </script>
</body>
</html>
